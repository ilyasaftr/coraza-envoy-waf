name: Publish Docker image

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

concurrency:
  group: dockerpush-${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_REPO: coraza-envoy-waf
  GO_BUILD_TAGS: memoize_builders,coraza.rule.no_regex_multiline,re2_cgo,libinjection_cgo

jobs:
  build_amd64:
    name: Build (amd64)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: image
        run: |
          image="${{ env.REGISTRY }}/${GITHUB_REPOSITORY_OWNER,,}/${{ env.IMAGE_REPO }}"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "$image:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push (by digest)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          provenance: false
          build-args: |
            GO_BUILD_TAGS=${{ env.GO_BUILD_TAGS }}
          outputs: type=image,name=${{ steps.image.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build_arm64:
    name: Build (arm64)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: image
        run: |
          image="${{ env.REGISTRY }}/${GITHUB_REPOSITORY_OWNER,,}/${{ env.IMAGE_REPO }}"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "$image:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push (by digest)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64/v8
          provenance: false
          build-args: |
            GO_BUILD_TAGS=${{ env.GO_BUILD_TAGS }}
          outputs: type=image,name=${{ steps.image.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  merge_manifests:
    name: Create multi-arch manifests
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    needs: [build_amd64, build_arm64]
    permissions:
      contents: read
      packages: write
    outputs:
      previous_latest_digest: ${{ steps.rollback_prep.outputs.previous_latest_digest }}
      rollback_command: ${{ steps.rollback_prep.outputs.rollback_command }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: image
        run: |
          image="${{ env.REGISTRY }}/${GITHUB_REPOSITORY_OWNER,,}/${{ env.IMAGE_REPO }}"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "$image:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare rollback details
        id: rollback_prep
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.image.outputs.image }}"
          latest_output="$(docker buildx imagetools inspect "${image}:latest" 2>/dev/null || true)"
          previous_latest_digest="$(printf '%s\n' "${latest_output}" | awk '/^Digest: / { print $2; exit }')"
          if [ -n "${previous_latest_digest}" ]; then
            rollback_command="docker buildx imagetools create -t ${image}:latest ${image}@${previous_latest_digest}"
            {
              echo "previous_latest_digest=${previous_latest_digest}"
              echo "rollback_command=${rollback_command}"
            } >> "$GITHUB_OUTPUT"
            {
              echo "### Rollback prep"
              echo ""
              echo "- previous_latest_digest: \`${previous_latest_digest}\`"
              echo "- rollback_command: \`${rollback_command}\`"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "previous_latest_digest="
              echo "rollback_command="
            } >> "$GITHUB_OUTPUT"
            {
              echo "### Rollback prep"
              echo ""
              echo "- no existing \`latest\` manifest digest found"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create and push manifest list for each tag
        run: |
          set -eu
          IMAGE="${{ steps.image.outputs.image }}"
          AMD_DIGEST="${{ needs.build_amd64.outputs.digest }}"
          ARM_DIGEST="${{ needs.build_arm64.outputs.digest }}"
          TAGS="${{ steps.image.outputs.tags }}"
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker buildx imagetools create \
              -t "${tag}" \
              "${IMAGE}@${AMD_DIGEST}" \
              "${IMAGE}@${ARM_DIGEST}"
          done <<< "$TAGS"
