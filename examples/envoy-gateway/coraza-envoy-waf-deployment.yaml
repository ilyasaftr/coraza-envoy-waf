apiVersion: apps/v1
kind: Deployment
metadata:
  name: coraza-ext-proc
  namespace: gateway-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: coraza-ext-proc
  template:
    metadata:
      labels:
        app: coraza-ext-proc
    spec:
      containers:
        - name: coraza-envoy-waf
          image: ghcr.io/ilyasaftr/coraza-envoy-waf:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: WAF_PROFILES_PATH
              value: /etc/coraza/profiles.yaml
            - name: GRPC_BIND
              value: ":9002"
            - name: METRICS_BIND
              value: ":9090"
            - name: LOG_LEVEL
              value: "info"
          ports:
            - name: grpc
              containerPort: 9002
            - name: metrics
              containerPort: 9090
          volumeMounts:
            - name: profiles
              mountPath: /etc/coraza/profiles.yaml
              subPath: profiles.yaml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
      volumes:
        - name: profiles
          configMap:
            name: coraza-ext-proc-profiles

